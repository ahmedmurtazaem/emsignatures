<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Murtaza - Email Signature</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="email-signature">
        <div class="signature-backdrop">
            <img src="https://www.figma.com/api/mcp/asset/d829369e-9ace-4e6f-8eae-91c5c0f7900f" alt="Signature Backdrop" class="backdrop-image">
        </div>
        
        <div class="main-container">
            <div class="header">
                <div class="logo">
                    <img src="assets/em-logo.svg" alt="Logo" class="logo-image">
                </div>
                
                <div class="name-title">
                    <h1 class="name">Hady Shaikh</h1>
                    <p class="title">CEO & Founder</p>
                </div>
            </div>
            
            <div class="info-section">
                <div class="info-badge">
                    <img src="https://www.figma.com/api/mcp/asset/44685fb2-1326-4a50-8ec6-1678ba60b9e6" alt="Mobile" class="icon">
                    <span>+971 55 633 2806</span>
                </div>
                
                <div class="info-badge">
                    <img src="https://www.figma.com/api/mcp/asset/ce347a0b-e0f0-47c8-9b57-e6cd8b7f3a67" alt="Phone" class="icon">
                    <span>+971 4 876 9396</span>
                </div>
                
                <div class="info-badge">
                    <img src="https://www.figma.com/api/mcp/asset/116be92a-45fe-421d-882b-4dc3c47695b6" alt="Email" class="icon">
                    <a href="mailto:hady@epicmetry.com" style="color: white; text-decoration: none;">hady@epicmetry.com</a>
                </div>
                
                <div class="info-badge">
                    <img src="https://www.figma.com/api/mcp/asset/69174161-5ac4-4f58-9492-939e26b95f59" alt="Website" class="icon">
                    <a href="https://www.epicmetry.com" target="_blank" style="color: white; text-decoration: none;">www.epicmetry.com</a>
                </div>
                
                <div class="info-badge wide">
                    <img src="https://www.figma.com/api/mcp/asset/bd6ca3c4-ab5e-4eba-9398-e3efc9425e2c" alt="Address" class="icon">
                    <span>9W, 9WC, Dubai Airport Freezone, Dubai, UAE</span>
                </div>
            </div>
            
            <div class="divider">
                <img src="https://www.figma.com/api/mcp/asset/635799e7-2e31-4df6-abeb-d168df8d6398" alt="Divider" class="divider-image">
            </div>
            
            <div class="footer">
                <div class="info-text">
                    <img src="https://www.figma.com/api/mcp/asset/3da0b90e-ff85-4180-b511-50ae71969c02" alt="Info Text" class="info-text-image">
                </div>
                
                <div class="social-section">
                    <p class="follow-text">Follow us:</p>
                    <div class="social-media">
                        <img src="https://www.figma.com/api/mcp/asset/a3fcbb98-6df0-4a70-a76f-2c9cd46ab64f" alt="Facebook" class="social-icon">
                        <img src="https://www.figma.com/api/mcp/asset/4a3175ee-6a8c-4a66-9740-5bf8f3da045c" alt="Instagram" class="social-icon">
                        <img src="https://www.figma.com/api/mcp/asset/f8f121ca-24e4-49b8-a3f5-34be9fee119c" alt="X" class="social-icon">
                        <img src="https://www.figma.com/api/mcp/asset/1534fc2d-035a-41c7-8321-dfbd0a9cfa4b" alt="LinkedIn" class="social-icon">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
